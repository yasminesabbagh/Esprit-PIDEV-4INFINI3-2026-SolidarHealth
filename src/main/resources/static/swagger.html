<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PI4 Microfinance API Docs</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <!-- Swagger UI default styles -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css"
    />

    <style>
      :root {
        --pi-bg: #f8faf9;
        --pi-card: #ffffff;
        --pi-primary: #16a34a;
        --pi-primary-soft: rgba(22, 163, 74, 0.1);
        --pi-border: rgba(15, 23, 42, 0.08);
        --pi-text: #0f172a;
        --pi-muted: #64748b;
      }

      body {
        margin: 0;
        background: var(--pi-bg);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
      }

      .swagger-ui {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1.5rem 1rem 3rem;
      }

      /* Top header similar to GroupsPaymentsModule */
      .pi-header {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        margin-bottom: 1.5rem;
      }

      .pi-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--pi-text);
      }

      .pi-subtitle {
        font-size: 0.95rem;
        color: var(--pi-muted);
      }

      .swagger-ui .topbar {
        display: none;
      }

      /* Hide Swagger UI’s duplicate title/description (we use .pi-header above) */
      .swagger-ui .information-container,
      .swagger-ui .info {
        display: none;
      }

      .swagger-ui .scheme-container {
        border-radius: 0.75rem;
        border: 1px solid var(--pi-border);
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.96),
          rgba(248, 250, 249, 0.98)
        );
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      }

      .swagger-ui .opblock {
        border-radius: 0.75rem;
        border-width: 1px;
        border-color: var(--pi-border);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      .swagger-ui .opblock-summary {
        padding: 12px 18px;
      }

      .swagger-ui .opblock .opblock-summary-method {
        border-radius: 999px;
        padding: 4px 14px;
        font-weight: 600;
      }

      .swagger-ui .opblock-tag {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--pi-text);
      }

      .swagger-ui .opblock-tag small {
        color: var(--pi-muted);
      }

      .swagger-ui .btn.execute.opblock-control__btn {
        background: var(--pi-primary);
        border-radius: 999px;
        border: none;
        box-shadow: 0 10px 25px rgba(22, 163, 74, 0.4);
      }

      .swagger-ui .btn.execute.opblock-control__btn:hover {
        background: #15803d;
      }

      .swagger-ui .curl-command {
        border-radius: 0.5rem;
        background: #020617;
      }

      .swagger-ui .model-box {
        border-radius: 0.5rem;
      }

      .pi-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.15rem 0.6rem;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 500;
        background: var(--pi-primary-soft);
        color: var(--pi-primary);
        border: 1px solid rgba(22, 163, 74, 0.35);
      }

      .pi-badge-dot {
        width: 0.4rem;
        height: 0.4rem;
        border-radius: 999px;
        background: var(--pi-primary);
      }
    </style>
  </head>

  <body>
    <div class="swagger-ui">
      <header class="pi-header">
        <div class="pi-badge">
          <span class="pi-badge-dot"></span>
          Module 1 · Groups & Payments
        </div>
        <h1 class="pi-title">PI4 Microfinance API</h1>
        <p class="pi-subtitle">
          Backend endpoints for solidarity groups, memberships and payments.
        </p>
      </header>

      <div id="swagger-ui-root"></div>
    </div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      window.onload = () => {
        SwaggerUIBundle({
          url: "/v3/api-docs",
          dom_id: "#swagger-ui-root",
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: "BaseLayout",
        });
      };
    </script>
  </body>
</html>
